<!DOCTYPE html>
<html>

<head>
    <title>Attendance History</title>
</head>

<body>

<h1>Attendance History</h1>

<table border="1" cellpadding="8">

<tr>
    <th>ID Number</th>
    <th>Name</th>
    <th>Course</th>
    <th>Room</th>
    <th>Date</th>
    <th>Time</th>
    <th>Status</th>
</tr>

{% for row in records %}

<tr>

<td>{{ row.id_number }}</td>

<td>{{ row.first_name }} {{ row.last_name }}</td>

<td>{{ row.course_code }}</td>

<td>{{ row.room_name }}</td>

<td>{{ row.attendance_date }}</td>

<td>{{ row.time_in }}</td>

<td>{{ row.status }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
