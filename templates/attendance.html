<!DOCTYPE html>
<html>

<head>

    <title>Attendance Scanner</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:30px;
        }

        h1{
            text-align:center;
        }

        .container{

            width:1200px;
            margin:auto;
            display:flex;
            gap:30px;

        }

        .camera{

            flex:2;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 15px gray;

        }

        .camera img{

            width:100%;
            border:4px solid green;
            border-radius:10px;

        }

        .info{

            flex:1;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 15px gray;

        }

        h2{

            margin-top:0;

        }

        .status{

            margin-top:20px;
            font-size:28px;
            color:green;
            font-weight:bold;

        }

        table{

            width:100%;
            border-collapse:collapse;

        }

        td{

            padding:10px;
            border-bottom:1px solid #ddd;

        }

    </style>

</head>

<body>

<h1>Student Attendance System</h1>

<div class="container">

    <div class="camera">

        <h2>Live Scanner</h2>

        <img src="{{ url_for('video_feed') }}">

    </div>

    <div class="info">

        <h2>Current Scan</h2>

        <table>

            <tr>
                <td><b>ID Number</b></td>
                <td id="id_number">Waiting...</td>
            </tr>

            <tr>
                <td><b>Name</b></td>
                <td id="name">Waiting...</td>
            </tr>

            <tr>
                <td><b>Course</b></td>
                <td id="course">Waiting...</td>
            </tr>

            <tr>
                <td><b>Room</b></td>
                <td id="room">Waiting...</td>
            </tr>

            <tr>
                <td><b>Time</b></td>
                <td id="time">Waiting...</td>
            </tr>

        </table>

        <div class="status" id="status">
            READY TO SCAN
        </div>

    </div>

</div>

<script>

function updateScanner(){

    fetch("/scanner/status")

    .then(response => response.json())

    .then(data=>{

        document.getElementById("id_number").innerHTML=data.id_number || "Waiting...";
        document.getElementById("name").innerHTML=data.name || "Waiting...";
        document.getElementById("course").innerHTML=data.course || "Waiting...";
        document.getElementById("room").innerHTML=data.room || "Waiting...";
        document.getElementById("time").innerHTML=data.time || "Waiting...";
        document.getElementById("status").innerHTML=data.status || "READY TO SCAN";

    });

}

setInterval(updateScanner,1000);

updateScanner();

</script>
</body>

</html>
