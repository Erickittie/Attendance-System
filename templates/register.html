<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container">

            <a class="navbar-brand fw-bold" href="/">
                Student Attendance System
            </a>

            <a href="/" class="btn btn-light">
                Home
            </a>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-lg-7">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">

                        <h3 class="mb-0">
                            Register Student
                        </h3>

                    </div>

                    <div class="card-body">

                        <form method="POST">

                            <!-- ID -->

                            <div class="mb-3">

                                <label class="form-label">
                                    ID Number
                                </label>

                                <input
                                    type="text"
                                    name="id_number"
                                    class="form-control"
                                    placeholder="2022008683"
                                    required>

                            </div>

                            <!-- First Name -->

                            <div class="mb-3">

                                <label class="form-label">
                                    First Name
                                </label>

                                <input
                                    type="text"
                                    name="first_name"
                                    class="form-control"
                                    required>

                            </div>

                            <!-- Last Name -->

                            <div class="mb-3">

                                <label class="form-label">
                                    Last Name
                                </label>

                                <input
                                    type="text"
                                    name="last_name"
                                    class="form-control"
                                    required>

                            </div>

                            <!-- Course -->

                            <div class="mb-3">

                                <label class="form-label">
                                    Program
                                </label>

                                <select
                                    name="course"
                                    class="form-select"
                                    required>

                                    <option value="">Select Program</option>

                                    <option value="BSIT">
                                        BSIT
                                    </option>

                                    <option value="BSCS">
                                        BSCS
                                    </option>

                                    <option value="BSIS">
                                        BSIS
                                    </option>

                                </select>

                            </div>

                            <!-- Year -->

                            <div class="mb-3">

                                <label class="form-label">
                                    Year Level
                                </label>

                                <select
                                    name="year_level"
                                    class="form-select"
                                    required>

                                    <option value="">Select Year</option>

                                    <option value="1">1st Year</option>

                                    <option value="2">2nd Year</option>

                                    <option value="3">3rd Year</option>

                                    <option value="4">4th Year</option>

                                </select>

                            </div>

                            <!-- Section -->

                            <div class="mb-4">

                                <label class="form-label">
                                    Section
                                </label>

                                <input
                                    type="text"
                                    name="section"
                                    class="form-control"
                                    placeholder="A"
                                    required>

                            </div>

                            <!-- Buttons -->

                            <div class="d-grid gap-2">

                                <button
                                    type="submit"
                                    class="btn btn-primary btn-lg">

                                    Register Student

                                </button>

                                <a
                                    href="/"
                                    class="btn btn-secondary">

                                    Back to Home

                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
